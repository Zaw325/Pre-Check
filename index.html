<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleaning Service Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .tab-scroll { display: flex; overflow-x: auto; gap: 10px; padding: 10px; scrollbar-width: none; }
        .tab-scroll::-webkit-scrollbar { display: none; }
        .btn-tab { padding: 8px 16px; border-radius: 99px; font-weight: 600; font-size: 13px; border: 1px solid #e2e8f0; background: white; transition: all 0.2s; white-space: nowrap; }
        .btn-tab.active { background: #2563eb; color: white; border-color: #2563eb; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .print-container { display: block !important; width: 100% !important; }
            .room-section { break-inside: avoid; border-bottom: 2px solid #f1f5f9; padding-bottom: 30px; margin-bottom: 30px; display: block !important; }
            .image-grid { display: grid !important; grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }
        }

        .image-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .photo-box { position: relative; border-radius: 12px; overflow: hidden; height: 180px; background: #f1f5f9; border: 1px solid #e2e8f0; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
        .delete-btn { position: absolute; top: 8px; right: 8px; background: rgba(239, 68, 68, 0.9); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body class="pb-10">

    <div class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 no-print">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-lg font-bold tracking-tight text-slate-900">CLEANING<span class="text-blue-600">PRO</span></h1>
            <div class="flex gap-2">
                <button onclick="clearAllData()" class="text-[10px] font-bold text-slate-400 uppercase mr-2">Clear</button>
                <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full font-bold text-xs transition shadow-lg">SAVE PDF</button>
            </div>
        </div>
        <div class="max-w-4xl mx-auto border-t border-slate-100 flex items-center pr-4">
            <div id="tabs" class="tab-scroll flex-1"></div>
            <button onclick="addRoom()" class="bg-slate-900 text-white px-3 py-1.5 rounded-lg font-bold text-xs shrink-0">+ ADD</button>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-4 mt-6 print-container">
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 mb-6">
            <div class="flex justify-between items-start">
                <div class="flex-1">
                    <label class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Site Address</label>
                    <textarea id="site-address" oninput="saveTextOnly()" placeholder="Enter address..." class="w-full mt-1 text-xl font-bold bg-transparent border-none focus:ring-0 p-0 resize-none" rows="2"></textarea>
                </div>
                <div class="text-right text-[10px] font-medium text-slate-400">
                    <p id="date-display"></p>
                    <p id="time-display"></p>
                </div>
            </div>
        </div>
        <div id="rooms-container"></div>
    </div>

    <script>
        let rooms = JSON.parse(localStorage.getItem('cleaning_v6_rooms')) || [
            { id: Date.now(), name: "Living Room", note: "", photos: [] }
        ];
        let address = localStorage.getItem('cleaning_v6_address') || "";
        let activeTabId = rooms[0].id;

        function init() {
            document.getElementById('date-display').innerText = new Date().toLocaleDateString();
            document.getElementById('time-display').innerText = new Date().toLocaleTimeString();
            document.getElementById('site-address').value = address;
            render();

            // Register Service Worker for PWA (Optional but recommended)
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/sw.js').catch(() => {});
                });
            }
        }

        function render() {
            const tabsContainer = document.getElementById('tabs');
            const roomsContainer = document.getElementById('rooms-container');
            tabsContainer.innerHTML = '';
            roomsContainer.innerHTML = '';

            rooms.forEach(room => {
                const btn = document.createElement('button');
                btn.className = `btn-tab ${room.id === activeTabId ? 'active' : ''}`;
                btn.innerText = room.name;
                btn.onclick = () => { activeTabId = room.id; render(); };
                tabsContainer.appendChild(btn);

                const section = document.createElement('div');
                section.className = `room-section bg-white rounded-2xl p-6 shadow-sm border border-slate-200 mb-6 ${room.id === activeTabId ? '' : 'hidden print:block'}`;
                section.innerHTML = `
                    <div class="flex justify-between items-center mb-4 no-print border-b pb-4">
                        <div class="flex-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase">Room Type</label>
                            <input type="text" value="${room.name}" oninput="updateRoomNameDirect(${room.id}, this.value)" class="w-full block text-lg font-bold outline-none">
                        </div>
                        <button onclick="deleteRoom(${room.id})" class="text-red-400 p-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                    <h2 class="hidden print:block text-xl font-bold text-slate-800 mb-3 border-l-4 border-blue-600 pl-3 uppercase">${room.name}</h2>
                    <textarea oninput="updateRoomNoteDirect(${room.id}, this.value)" placeholder="Add notes..." class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl text-sm mb-6 outline-none focus:bg-white">${room.note}</textarea>
                    <div class="flex justify-between items-center mb-4 no-print">
                        <h3 class="text-xs font-bold text-slate-800 uppercase tracking-wider">Photos</h3>
                        <button onclick="document.getElementById('file-${room.id}').click()" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-lg text-xs font-bold border border-blue-100">+ ADD PHOTOS</button>
                    </div>
                    <input type="file" id="file-${room.id}" multiple accept="image/*" class="hidden" onchange="handleImages(${room.id}, this)">
                    <div class="image-grid" id="grid-${room.id}">
                        ${room.photos.map((img, index) => `
                            <div class="photo-box shadow-sm">
                                <img src="${img}" loading="lazy">
                                <div class="delete-btn no-print" onclick="removePhoto(${room.id}, ${index})">×</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                roomsContainer.appendChild(section);
            });
        }

        function saveTextOnly() {
            address = document.getElementById('site-address').value;
            localStorage.setItem('cleaning_v6_address', address);
            localStorage.setItem('cleaning_v6_rooms', JSON.stringify(rooms));
        }

        function updateRoomNameDirect(id, val) {
            const room = rooms.find(r => r.id === id);
            if(room) room.name = val;
            const tabs = document.querySelectorAll('.btn-tab');
            const roomIndex = rooms.findIndex(r => r.id === id);
            if(tabs[roomIndex]) tabs[roomIndex].innerText = val;
            saveTextOnly();
        }

        function updateRoomNoteDirect(id, val) {
            const room = rooms.find(r => r.id === id);
            if(room) room.note = val;
            saveTextOnly();
        }

        function addRoom() {
            const newRoom = { id: Date.now(), name: "New Room", note: "", photos: [] };
            rooms.push(newRoom);
            activeTabId = newRoom.id;
            saveTextOnly();
            render();
        }

        function deleteRoom(id) {
            if(rooms.length > 1 && confirm("Delete room?")) {
                rooms = rooms.filter(r => r.id !== id);
                activeTabId = rooms[0].id;
                saveTextOnly();
                render();
            }
        }

        async function handleImages(roomId, input) {
            const files = Array.from(input.files);
            const room = rooms.find(r => r.id === roomId);
            for (const file of files) {
                const compressed = await compressImage(file);
                room.photos.push(compressed);
            }
            saveTextOnly();
            render();
        }

        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scale = 800 / img.width;
                        canvas.width = 800;
                        canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    }
                };
            });
        }

        function removePhoto(roomId, index) {
            const room = rooms.find(r => r.id === roomId);
            room.photos.splice(index, 1);
            saveTextOnly();
            render();
        }

        function clearAllData() {
            if(confirm("Start new report?")) {
                localStorage.clear();
                location.reload();
            }
        }

        init();
    </script>
</body>
</html>
